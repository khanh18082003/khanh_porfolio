<svg width="1200" height="680" viewBox="0 0 1200 680" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="680" fill="#F8FAFC"/>
  <text x="60" y="70" fill="#0F172A" font-size="34" font-family="Arial, sans-serif" font-weight="700">Database Design (ERD)</text>
  <text x="60" y="108" fill="#475569" font-size="18" font-family="Arial, sans-serif">Core entities and relationships for the production system</text>

  <rect x="70" y="170" width="300" height="220" rx="14" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  <rect x="70" y="170" width="300" height="46" rx="14" fill="#10B981"/>
  <text x="90" y="199" fill="white" font-size="20" font-family="Arial, sans-serif" font-weight="700">users</text>
  <text x="90" y="240" fill="#1E293B" font-size="16" font-family="Arial, sans-serif">PK id (uuid)</text>
  <text x="90" y="270" fill="#1E293B" font-size="16" font-family="Arial, sans-serif">email (unique)</text>
  <text x="90" y="300" fill="#1E293B" font-size="16" font-family="Arial, sans-serif">full_name</text>
  <text x="90" y="330" fill="#1E293B" font-size="16" font-family="Arial, sans-serif">created_at</text>

  <rect x="450" y="140" width="300" height="250" rx="14" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  <rect x="450" y="140" width="300" height="46" rx="14" fill="#0EA5E9"/>
  <text x="470" y="169" fill="white" font-size="20" font-family="Arial, sans-serif" font-weight="700">projects</text>
  <text x="470" y="210" fill="#1E293B" font-size="16" font-family="Arial, sans-serif">PK id (uuid)</text>
  <text x="470" y="240" fill="#1E293B" font-size="16" font-family="Arial, sans-serif">FK owner_id -> users.id</text>
  <text x="470" y="270" fill="#1E293B" font-size="16" font-family="Arial, sans-serif">title</text>
  <text x="470" y="300" fill="#1E293B" font-size="16" font-family="Arial, sans-serif">status</text>
  <text x="470" y="330" fill="#1E293B" font-size="16" font-family="Arial, sans-serif">updated_at</text>

  <rect x="830" y="200" width="300" height="220" rx="14" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  <rect x="830" y="200" width="300" height="46" rx="14" fill="#F59E0B"/>
  <text x="850" y="229" fill="white" font-size="20" font-family="Arial, sans-serif" font-weight="700">events</text>
  <text x="850" y="270" fill="#1E293B" font-size="16" font-family="Arial, sans-serif">PK id (uuid)</text>
  <text x="850" y="300" fill="#1E293B" font-size="16" font-family="Arial, sans-serif">FK project_id -> projects.id</text>
  <text x="850" y="330" fill="#1E293B" font-size="16" font-family="Arial, sans-serif">event_type</text>
  <text x="850" y="360" fill="#1E293B" font-size="16" font-family="Arial, sans-serif">payload (json)</text>

  <path d="M370 250 C410 250, 420 220, 450 220" stroke="#334155" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M750 260 C790 260, 790 290, 830 290" stroke="#334155" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <text x="365" y="232" fill="#334155" font-size="14" font-family="Arial, sans-serif" font-weight="700">1 : N</text>
  <text x="770" y="244" fill="#334155" font-size="14" font-family="Arial, sans-serif" font-weight="700">1 : N</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
</svg>
